packages:
  - frontend
  - hono
  - media
  - remark

# Settings <https://pnpm.io/settings>

## Dependency Resolution

trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1
blockExoticSubdeps: true

## Dependency Hoisting Settings

publicHoistPattern:
  - 'eslint'
  - 'markuplint'
  - 'stylelint'

## Build Settings

strictDepBuilds: true
allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: true
